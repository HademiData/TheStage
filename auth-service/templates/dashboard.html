<!DOCTYPE html>
<html lang="en">
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="/static/css/dashboard.css">
</head>
<body>

<nav class="navbar">

    <div class="logo">
        stage
    </div>

    <div class="nav-links">
        <a href="/">Home</a>
        <a href="#">Profile</a>
        <a href="#">Settings</a>
        <a href="/login">Logout</a>
    </div>

</nav>

<section class="dashboard">

    <div class="welcome">

        <span class="badge">
            {{.Role}}
        </span>

        <h1>
            Welcome back,
            {{.Name}}
        </h1>
        <p>
            {{.Email}}
        </p>

    </div>

    <div class="dashboard-grid">

        <div class="dashboard-card">

            <h3>Applications</h3>

            <h2>12</h2>

            <p>
                Speaking opportunities applied for
            </p>

        </div>

        <div class="dashboard-card">

            <h3>Upcoming Talks</h3>

            <h2>3</h2>

            <p>
                Scheduled speaking engagements
            </p>

        </div>

        <div class="dashboard-card">

            <h3>Profile Views</h3>

            <h2>156</h2>

            <p>
                Organizers viewed your profile
            </p>

        </div>

    </div>

</section>

</body>
</html>
